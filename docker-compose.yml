# -----------------------------------------------------------------------------
# ProofSettle Development Environment
#
# This compose configuration represents the planned local deployment structure.
# Additional services (Decision Engine, Trust Receipt Service, API Gateway,
# and database components) will be introduced as implementation progresses.
# -----------------------------------------------------------------------------

version: "3.9"

services:
  proofsettle:
    container_name: proofsettle
    image: proofsettle:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
